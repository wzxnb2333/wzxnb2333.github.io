<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>施工中</title>
    <style>
        /* CSS样式 */
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
        }
        
        .container {
            max-width: 800px;
            margin: 20px auto;
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        h1, h2, h3 {
            color: #333;
        }
        
        nav {
            margin-bottom: 20px;
            text-align: center;
        }
        
        nav ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
        }
        
        nav ul li {
            display: inline;
            margin-right: 20px;
        }
        
        nav ul li a {
            text-decoration: none;
            color: #333;
            transition: color 0.3s ease; /* 添加颜色过渡效果 */
        }
        
        nav ul li a:hover {
            color: #ff6600; /* 当鼠标悬停时改变颜色 */
        }
        
        /* 更多样式可以根据需要添加 */
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <ul>
                <li><a href="#">首页</a></li>
                <li><a href="#">关于</a></li>
                <li><a href="#">联系</a></li>
            </ul>
        </nav>
        
        <h1>buliding</h1>
        <p>I am developing Nintendo 64 programe</p>
        
        <!-- 这里可以添加论坛内容，比如帖子列表、评论等 -->
        
        <script>
            // JavaScript代码可以在这里添加
            // 比如交互功能或者处理表单提交等
            // 但是需要注意，我们会在此处添加一些简单的动画效果
            // 比如鼠标悬停在导航链接上时，链接的颜色会发生变化（在CSS中已经实现）
        </script>
    </div>
</body>
</html>
