<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Website</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo">MyBrand</div>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#products">Products</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section id="home">
        <h1>Welcome to MyBrand</h1>
        <p>Your one-stop shop for the best products.</p>
    </section>

    <section id="products">
        <h2>Our Products</h2>
        <div class="product">
            <img src="product1.jpg" alt="Product 1">
            <h3>Product 1</h3>
            <p>Product 1 description goes here.</p>
            <button class="buy-now" data-product-id="1">Buy Now</button>
        </div>
        <!-- Repeat product divs as needed -->
    </section>

    <footer id="contact">
        <h2>Contact Us</h2>
        <p>Email: contact@mybrand.com</p>
        <p>Phone: 123-456-7890</p>
    </footer>

    <script src="scripts.js"></script>
</body>
</html>
